name: CI

on:
  pull_request:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/ci.yml"
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "vbc/**"
      - "tests/**"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libimage-exiftool-perl

      - name: Install dependencies
        run: uv sync --frozen --extra docs --extra dev

      - name: Test docs sync
        run: uv run pytest tests/test_docs_sync.py -q

      - name: Test unit suite
        run: uv run pytest tests/unit/ -q

      - name: Test safe integration subset
        run: >
          uv run pytest
          tests/integration/test_metadata_copy.py
          tests/integration/test_skipping.py
          tests/integration/test_orchestrator.py
          tests/integration/test_hw_cap.py
          tests/integration/test_error_markers.py
          tests/integration/test_concurrency.py
          tests/integration/test_color_fix.py
          tests/integration/test_advanced_errors.py
          -q

      - name: Build docs
        run: uv run mkdocs build
