name: Build and deploy VBC docs

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/deploy.yml"
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "vbc/**"
      - "tests/test_docs_sync.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen --extra docs --extra dev

      - name: Test docs sync
        run: uv run pytest tests/test_docs_sync.py -q

      - name: Build docs
        run: uv run mkdocs build

      - name: Upload docs artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: vbc-docs-site
          path: site/
          if-no-files-found: error
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build-docs

    environment:
      name: production

    steps:
      - name: Download docs artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: vbc-docs-site
          path: site

      - name: Configure SSH
        env:
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/known_hosts ~/.ssh/deploy_key

      - name: Deploy
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes" \
            site/ \
            "${{ vars.VPS_USER }}@${{ vars.VPS_HOST }}:${{ vars.VPS_TARGET }}/"

      - name: Remove SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
